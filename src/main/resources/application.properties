server.port=8080

spring.application.name=user-service

spring.config.import=optional:configserver:http://${EUREKA_USERNAME:admin}:${EUREKA_PASSWORD:admin}@${CONFIG_SERVER_HOST:config-server}:8888

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/user_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

jwt.secret=${JWT_SECRET:fallback-secret-key-change-in-production-minimum-32-chars}
jwt.expiration=86400000

eureka.client.service-url.defaultZone=http://${EUREKA_USERNAME:admin}:${EUREKA_PASSWORD:admin}@${EUREKA_HOST:eureka-server}:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true

eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=5

management.endpoints.web.exposure.include=health,info,refresh

logging.level.com.revpay=INFO